name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

  workflow_dispatch:
    inputs:
      docs_branch:
        description: 'Branch to use for jEAP documentation sources'
        required: false
        default: main

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    environment:
      name: surge-sh
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clone jEAP documentation sources
        run: bash scripts/clone-docs.sh
        env:
          REPO_BASE_URL: https://github.com/jeap-admin-ch
          BRANCH: ${{ inputs.docs_branch || 'main' }}
          GH_TOKEN: ${{ github.token }}

      - name: Prepare documentation for GitHub Pages
        run: bash scripts/prepare-docs.sh

      - name: Build site (noindex)
        run: npm run build
        env:
          NOINDEX: 'true'

      - name: Add robots.txt to disallow all
        run: |
          echo -e "User-agent: *\nDisallow: /" > build/robots.txt

      - name: Deploy to Surge
        id: surge
        uses: ./.github/actions/surge
        with:
          command: deploy
          pr_number: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
          docs_branch: ${{ inputs.docs_branch || 'main' }}
          build_dir: ./build
          token: ${{ secrets.SURGE_TOKEN }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2
        with:
          header: surge-preview
          message: |
            🚀 **Preview deployed!**
            ${{ steps.surge.outputs.url }}

      - name: Print preview URL
        if: github.event_name == 'workflow_dispatch'
        run: echo "🚀 Preview deployed at ${{ steps.surge.outputs.url }}"
