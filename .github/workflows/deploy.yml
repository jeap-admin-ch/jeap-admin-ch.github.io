name: Deploy to GitHub Pages

on:
  push:
    branches: [ "**" ]

  schedule:
    - cron: '0 4 * * *'
      timezone: 'Europe/Zurich'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clone jEAP documentation sources
        run: bash scripts/clone-docs.sh
        env:
          REPO_BASE_URL: https://github.com/jeap-admin-ch
          BRANCH: feature/JEAP-7069 # TODO JEAP-7069

      - name: Prepare documentation for GitHub Pages
        run: bash scripts/prepare-docs.sh

      - name: Build site
        run: npm run build

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
