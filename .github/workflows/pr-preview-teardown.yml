name: PR Preview Teardown

on:
  pull_request:
    types: [closed]

  workflow_dispatch:
    inputs:
      docs_branch:
        description: 'Branch used for jEAP documentation sources (must match the deployed preview)'
        required: false
        default: main

permissions:
  pull-requests: write

jobs:
  teardown:
    environment:
      name: surge-sh
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Teardown Surge preview
        uses: ./.github/actions/surge
        with:
          command: teardown
          pr_number: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
          docs_branch: ${{ inputs.docs_branch || 'main' }}
          token: ${{ secrets.SURGE_TOKEN }}

      - name: Update PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2
        with:
          header: surge-preview
          message: |
            🏁 **Preview torn down** (PR closed).
